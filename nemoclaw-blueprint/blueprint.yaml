version: 0.1.0
min_openshell_version: 0.0.19
min_openclaw_version: 2026.4.2
description: "Zero-Injection Blueprint for OpenClaw. \nOrchestrates secure inference\
  \ routing via a host-side auditable gateway.\n"
components:
  sandbox:
    image: ghcr.io/nvidia/openshell-community/sandboxes/openclaw:latest
    name: openclaw-sandbox
    forward_ports:
    - 18789
  inference:
    profiles:
      default:
        provider_type: openai
        provider_name: guard
        endpoint: http://host.openshell.internal:8090/v1
        credential_env: OPENROUTER_API_KEY
        credential_default: guard-managed
        model: nvidia/nemotron-3-super-120b-a12b:free
  policy:
    base: nemoclaw-blueprint/policies/openclaw-sandbox.yaml
mappings:
- host: sandbox_workspace/openclaw
  container: /sandbox/.openclaw
  mode: ro
- host: sandbox_workspace/openclaw-data
  container: /sandbox/.openclaw-data
  mode: rw
